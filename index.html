<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Zone - متجر الألعاب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- القائمة الجانبية -->
        <nav class="sidebar">
            <div class="logo">
                <h1>🎮 App Zone</h1>
            </div>
            <ul class="menu">
                <li><a href="#" onclick="filterCategory('all'); return false;" class="active">جميع الألعاب</a></li>
                <li><a href="#" onclick="filterCategory('action'); return false;">ألعاب أكشن</a></li>
                <li><a href="#" onclick="filterCategory('puzzle'); return false;">ألعاب الألغاز</a></li>
                <li><a href="#" onclick="filterCategory('sports'); return false;">ألعاب رياضية</a></li>
                <li><a href="#" onclick="filterCategory('adventure'); return false;">ألعاب المغامرات</a></li>
                <li><a href="#" onclick="filterCategory('strategy'); return false;">ألعاب الاستراتيجية</a></li>
            </ul>
        </nav>

        <!-- المحتوى الرئيسي -->
        <div class="main-content">
            <!-- شريط البحث -->
            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 ابحث عن لعبة..."
                    onkeyup="searchGames()"
                >
            </div>

            <!-- شبكة الألعاب -->
            <div class="games-grid" id="gamesGrid">
                <!-- سيتم ملء الألعاب هنا بواسطة JavaScript -->
            </div>
        </div>
    </div>

    <!-- Modal للتفاصيل -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modalImage" src="" alt="">
                <h2 id="modalTitle"></h2>
                <p id="modalDescription"></p>
                <p id="modalCategory"></p>
                <p id="modalRating"></p>
                <a id="downloadBtn" href="https://appzone771.blogspot.com/?m=1" target="_blank" class="download-btn">
                    📥 تنزيل اللعبة
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
